services:
  # Node.js server (built Wasp app, deployed via Docker from render-server branch)
  - type: web
    name: myapp-server
    runtime: docker
    plan: free
    region: oregon
    branch: render-server
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: myapp-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: WASP_SERVER_URL
        fromService:
          name: myapp-server
          type: web
          property: host
      - key: CLIENT_URL
        fromService:
          name: myapp-client
          type: web
          property: host
      - key: STRIPE_API_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: PAYMENTS_HOBBY_SUBSCRIPTION_PLAN_ID
        sync: false
      - key: PAYMENTS_PRO_SUBSCRIPTION_PLAN_ID
        sync: false
      - key: PAYMENTS_CREDITS_10_PLAN_ID
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  # React client (built Wasp app static assets, deployed from render-client branch)
  - type: web
    name: myapp-client
    runtime: static
    branch: render-client
    buildCommand: npm install && npm run build
    staticPublishPath: build
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          name: myapp-server
          type: web
          property: host

databases:
  - name: myapp-db
    databaseName: myapp
    user: myapp
    plan: free
    region: oregon
    postgresMajorVersion: "16"
    ipAllowList: []
